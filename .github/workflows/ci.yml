name: CI
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install ALSA (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  house-style:
    name: house style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No emoji / dash / attribution
        run: bash scripts/check-style.sh

  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: coverage (>= 80% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install ALSA (for cpal)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev
      - uses: taiki-e/install-action@cargo-llvm-cov
      # The gpu, audio, and app crates are integration-tested on real hardware
      # (they need a GPU adapter, an audio device, or a window, which headless CI
      # lacks), so they are excluded from the line-coverage gate.
      - name: Coverage gate
        run: cargo llvm-cov --workspace --fail-under-lines 80 --ignore-filename-regex '(crates[\\/](gpu|audio)|faces[\\/]app)[\\/]'

  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ALSA (Linux, for cpal)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev
      - run: cargo build --workspace --locked
